apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor
  namespace: smart-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor
  template:
    metadata:
      labels:
        app: sensor
    spec:
      containers:
      - name: sensor
        image: smart-factory-sensor:local
        env:
        - name: API_URL
          value: "http://api:5000/data"