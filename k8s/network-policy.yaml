apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-restrict-access
  namespace: smart-factory
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: sensor
    ports:
    - protocol: TCP
      port: 5000